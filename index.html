<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employee Attendance Pro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="login.css">
</head>
<body>
<nav class="navbar navbar-expand-lg custom-navbar">
  <div class="container">
    <a class="navbar-brand fw-bold custom-brand" href="#">Attendance Pro</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" 
      aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link active custom-link" aria-current="page" href="#">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link custom-link" href="#">About</a>
        </li>
        <li class="nav-item">
          <a class="nav-link custom-link" href="#">Contact</a>
        </li>
        <li class="nav-item">
          <a class="btn btn-success ms-3 px-3" href="#">Login</a>
        </li>
      </ul>
    </div>
  </div>
</nav>


  <div class="auth-container">
    <!-- Login Form -->
    <div class="auth-box" id="loginBox">
      <h3>Login to Your Account</h3>
      <form id="loginForm">
        <div class="mb-3">
          <input type="email" class="form-control" id="loginEmail" placeholder="Enter Your Email" required>
        </div>
        <div class="mb-3">
          <input type="password" class="form-control" id="loginPassword" placeholder="Enter Your Password" required>
        </div>
        <button type="submit" class="btn btn-custom">LOGIN</button>
        <div class="extra-links">
          Forgot password? <a href="#">Reset Password</a><br>
          Don’t have an account? <a href="#" onclick="toggleForms()">Sign Up Here</a>
        </div>
      </form>
    </div>

    <!-- Register Form -->
    <div class="auth-box d-none" id="registerBox">
      <h3>Create a New Account</h3>
      <form id="registerForm">
        <div class="mb-3">
          <input type="email" class="form-control" id="regEmail" placeholder="Enter Your Email" required>
        </div>
        <div class="mb-3">
          <input type="password" class="form-control" id="regPassword" placeholder="Enter Your Password" required>
        </div>
        <div class="mb-3">
          <select class="form-select" id="regRole" required>
            <option value="">Select Role</option>
            <option value="Employee">Employee</option>
            <option value="Manager">Manager</option>
            <option value="Admin">Admin</option>
            <option value="Super Admin">Super Admin</option>
          </select>
        </div>
        <div class="mb-3">
          <input type="text" class="form-control" id="regCompany" placeholder="Company Name" required>
        </div>
        <button type="submit" class="btn btn-custom">CREATE ACCOUNT</button>
        <div class="extra-links">
          Already have an account? <a href="#" onclick="toggleForms()">Login</a>
        </div>
      </form>
    </div>
  </div>

  <footer>
    © 2025 Attendance Pro | <a href="#">Privacy Policy</a> | <a href="#">Terms of Service</a>
  </footer>

  <script src="login.js"></script>

</body>
</html>
